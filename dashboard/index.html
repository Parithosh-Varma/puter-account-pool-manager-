<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Puter Account Pool Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-color: #0b0f19;
        --text-primary: #f3f4f6;
        --text-secondary: #9ca3af;
        --card-bg: rgba(17, 24, 39, 0.6);
        --card-border: rgba(243, 244, 246, 0.08);
        --panel-bg: #111827;
        --input-bg: #111827;
        --border-subtle: rgba(243, 244, 246, 0.04);
        --chart-grid: rgba(255, 255, 255, 0.04);
        --chart-tooltip-bg: #111827;
        --scroll-thumb: rgba(255, 255, 255, 0.08);
        --scroll-thumb-hover: rgba(255, 255, 255, 0.15);
      }
      :root[data-theme="light"] {
        --bg-color: #f8fafc;
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --card-bg: rgba(255, 255, 255, 0.85);
        --card-border: rgba(0, 0, 0, 0.08);
        --panel-bg: #f1f5f9;
        --input-bg: #ffffff;
        --border-subtle: rgba(0, 0, 0, 0.05);
        --chart-grid: rgba(0, 0, 0, 0.05);
        --chart-tooltip-bg: #ffffff;
        --scroll-thumb: rgba(0, 0, 0, 0.1);
        --scroll-thumb-hover: rgba(0, 0, 0, 0.2);
      }
      body {
        margin: 0;
        background-color: var(--bg-color);
        color: var(--text-primary);
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
        overflow-x: hidden;
        transition: background-color 0.3s, color 0.3s;
      }
      /* Custom modern scrollbars */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--scroll-thumb);
        border-radius: 999px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--scroll-thumb-hover);
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.4; transform: scale(0.9); }
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
